server.port=${PORT:8080}

# ── Database Configuration ───────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/pvr_prime_naturals}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── JWT ───────────────────────────────────────────────────────────────────────
pvr.app.jwtSecret=${JWT_SECRET:default-jwt-secret-change-in-production-must-be-very-long}
pvr.app.jwtExpirationMs=86400000

# ── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── AWS S3 ────────────────────────────────────────────────────────────────────
aws.s3.access-key=${AWS_ACCESS_KEY:}
aws.s3.secret-key=${AWS_SECRET_KEY:}
aws.s3.bucket=${AWS_S3_BUCKET:pvr-prime-naturals-app}
aws.s3.region=${AWS_S3_REGION:eu-north-1}

# ── Razorpay ──────────────────────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# ── CORS ─────────────────────────────────────────────────────────────────────
# CORS allowed origins – include both local dev and production URLs
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://pvr-prime-naturals-fe.vercel.app,https://pvr-prime-naturals-gezrf5e62-pradeep21.vercel.app,https://pvr-prime-naturals-54uuiukqt-pradeep21.vercel.app,https://pvr-dk7i4n35v-pradeep21.vercel.app,https://pvr-prime-naturals-l8lbi3del-pradeep21.vercel.app,http://localhost:5173}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Frontend & Cookie Security ────────────────────────────────────────────────
# Set to false for local HTTP dev; set to true + update url for production
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
pvr.app.cookie.secure=${COOKIE_SECURE:false}

# ── Admin Default Credentials ─────────────────────────────────────────────────
app.admin.email=${ADMIN_EMAIL:admin@gmail.com}
app.admin.password=${ADMIN_PASSWORD:admin123}
